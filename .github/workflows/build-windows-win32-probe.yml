name: Build Windows Win32 probe

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths:
      - ".github/workflows/build-windows-win32-probe.yml"

permissions:
  contents: read

jobs:
  build-windows-win32:
    name: Build Windows Win32 probe
    runs-on: windows-2022

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Download wxWidgets 3.2.1 Win32 build dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Get-Command 7z -ErrorAction SilentlyContinue)) {
            choco install 7zip --yes --no-progress
          }

          $wxDir = Join-Path $env:RUNNER_TEMP "wxwidgets-win32"
          New-Item -ItemType Directory -Force -Path $wxDir | Out-Null

          $devArchive = Join-Path $env:RUNNER_TEMP "wxMSW-3.2.1_vc14x_Dev.7z"
          $headersArchive = Join-Path $env:RUNNER_TEMP "wxWidgets-3.2.1-headers.7z"

          Invoke-WebRequest `
            -Uri "https://github.com/wxWidgets/wxWidgets/releases/download/v3.2.1/wxMSW-3.2.1_vc14x_Dev.7z" `
            -OutFile $devArchive

          Invoke-WebRequest `
            -Uri "https://github.com/wxWidgets/wxWidgets/releases/download/v3.2.1/wxWidgets-3.2.1-headers.7z" `
            -OutFile $headersArchive

          7z x $devArchive "-o$wxDir" | Out-Host
          7z x $headersArchive "-o$wxDir" | Out-Host

          $wxHeader = Get-ChildItem $wxDir -Recurse -File -Filter "wx.h" |
            Where-Object { $_.FullName -match "\\include\\wx\\wx\.h$" } |
            Select-Object -First 1

          if (-not $wxHeader) {
            throw "wxWidgets header wx.h was not found after extraction."
          }

          $wxRoot = Split-Path (Split-Path (Split-Path $wxHeader.FullName -Parent) -Parent) -Parent

          $wxLib = Get-ChildItem $wxRoot -Directory -Recurse |
            Where-Object { $_.Name -eq "vc14x_dll" } |
            Select-Object -First 1

          if (-not $wxLib) {
            throw "wxWidgets Win32 DLL library directory was not found."
          }

          "WX_ROOT=$wxRoot" | Add-Content $env:GITHUB_ENV
          "WX_LIB=$($wxLib.FullName)" | Add-Content $env:GITHUB_ENV

          Write-Host "wxWidgets root: $wxRoot"
          Write-Host "wxWidgets libraries: $($wxLib.FullName)"

      - name: Install GNU Gettext tools
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          choco install gettext --yes --no-progress

          $gettextBin = "C:\Program Files\gettext-iconv\bin"

          if (-not (Test-Path $gettextBin)) {
            throw "GNU Gettext bin directory was not found: $gettextBin"
          }

          "$gettextBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          $msgfmt = Join-Path $gettextBin "msgfmt.exe"
          $msgmerge = Join-Path $gettextBin "msgmerge.exe"

          if (-not (Test-Path $msgfmt)) {
            throw "msgfmt.exe was not found: $msgfmt"
          }

          if (-not (Test-Path $msgmerge)) {
            throw "msgmerge.exe was not found: $msgmerge"
          }

          Write-Host "msgfmt: $msgfmt"
          Write-Host "msgmerge: $msgmerge"

      - name: Configure Open Observer Win32 build
        shell: pwsh
        env:
          WX_VER: "32"
        run: |
          cmake -S . -B build-windows-win32-probe -A Win32 `
            -DCMAKE_BUILD_TYPE=Release `
            -DwxWidgets_ROOT_DIR="$env:WX_ROOT" `
            -DwxWidgets_LIB_DIR="$env:WX_LIB"

      - name: Build Open Observer Win32
        shell: pwsh
        run: |
          cmake --build build-windows-win32-probe --config Release --parallel

      - name: List generated binaries
        if: always() && hashFiles('build-windows-win32-probe/**') != ''
        shell: pwsh
        run: |
          Get-ChildItem build-windows-win32-probe -Recurse -Include *.dll,*.lib,*.exe |
            Select-Object FullName, Length |
            Format-Table -AutoSize

      - name: Upload Windows Win32 probe artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: openobserver-windows-win32-probe
          path: build-windows-win32-probe
          if-no-files-found: warn
          retention-days: 14
