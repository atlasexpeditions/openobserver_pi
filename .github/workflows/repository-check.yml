name: Repository check

on:
  workflow_dispatch:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

permissions:
  contents: read

jobs:
  repository-check:
    name: Verify source tree and packaged resources
    runs-on: ubuntu-latest

    steps:
      - name: Check out source and submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Verify required project files
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Current commit ==="
          git log -1 --oneline

          echo
          echo "=== Submodule status ==="
          git submodule status

          echo
          echo "=== Required source files ==="
          test -f CMakeLists.txt
          test -f src/openobserver_pi.cpp
          test -f src/ooDataLogger.cpp
          test -f src/ooScientificPackage.cpp
          test -f data/ProjectTemplates/Default.xml
          test -f data/ScientificPackageTemplates/Default.xml

          echo
          echo "=== Listings ==="
          test -d data/Listings
          find data/Listings -type f -name "*.xml" | sort
          test "$(find data/Listings -type f -name "*.xml" | wc -l)" -ge 10

          echo
          echo "=== User icons ==="
          test -d data/UserIcons
          find data/UserIcons -type f -name "*.svg" | sort
          test "$(find data/UserIcons -type f -name "*.svg" | wc -l)" -ge 20

          echo
          echo "=== Packaging configuration ==="
          grep -q 'DIRECTORY data' cmake/PluginInstall.cmake
          grep -q 'DIRECTORY data/Listings' CMakeLists.txt
          grep -q 'DIRECTORY data/ProjectTemplates' CMakeLists.txt
          grep -q 'DIRECTORY data/UserIcons' CMakeLists.txt

          echo
          echo "Repository check completed successfully."